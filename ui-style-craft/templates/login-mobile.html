<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>登录 · Northwind（移动端）</title>

  <!-- 中文界面用 CJK 字体栈；Geist 置于前仅作用于拉丁/数字 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="_tokens.css" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    * { margin: 0; box-sizing: border-box; }
    body {
      font-family: "Geist", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--color-surface-2);
      color: var(--color-text-primary);
      line-height: var(--line-height-normal);
      -webkit-font-smoothing: antialiased;
    }

    /* 居中模拟手机宽度（真实移动端可去掉 max-width） */
    .phone { max-width: 480px; margin-inline: auto; min-height: 100vh; background: var(--color-bg);
      display: flex; flex-direction: column; }

    /* 顶部品牌栏：含安全区 */
    .topbar {
      display: flex; align-items: center; gap: var(--space-3);
      padding: calc(var(--space-5) + env(safe-area-inset-top)) var(--space-5) var(--space-4);
    }
    .topbar .mark {
      width: 36px; height: 36px; border-radius: var(--radius-md); display: grid; place-items: center;
      color: var(--color-primary-fg); background: linear-gradient(155deg, #3b82f6, var(--color-primary));
    }
    .topbar .name { font-size: var(--font-size-lg); font-weight: var(--font-weight-semibold); letter-spacing: var(--letter-spacing-tighter); }

    .scroll { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-5) calc(var(--space-10) + env(safe-area-inset-bottom)); }

    .head { margin-bottom: var(--space-6); }
    .head h1 { font-size: var(--font-size-3xl); font-weight: var(--font-weight-semibold); letter-spacing: var(--letter-spacing-tighter); }
    .head p { margin-top: var(--space-2); color: var(--color-text-secondary); font-size: var(--font-size-sm); }

    /* 社交登录：触控目标 ≥ 44px，无 :hover，用 :active */
    .social { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-3); margin-bottom: var(--space-6); }
    .btn-social {
      display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
      min-height: 48px; padding-inline: var(--space-4); cursor: pointer;
      font: inherit; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium);
      color: var(--color-text-primary); background: var(--color-surface);
      border: 1px solid var(--color-border); border-radius: var(--radius-md);
      transition: background var(--duration-fast) var(--easing-standard), transform var(--duration-fast) var(--easing-standard);
    }
    .btn-social:active { background: var(--color-surface-2); transform: scale(.985); }
    .btn-social svg { width: 18px; height: 18px; flex-shrink: 0; }

    .divider { display: flex; align-items: center; gap: var(--space-3); margin: 0 0 var(--space-6); color: var(--color-text-muted); font-size: var(--font-size-xs); }
    .divider::before, .divider::after { content: ""; height: 1px; flex: 1; background: var(--color-border); }

    /* 字段：输入高 48px 触控友好 */
    .field { margin-bottom: var(--space-4); }
    .field label { display: block; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); margin-bottom: var(--space-2); }
    .control { position: relative; }
    .control .lead-icon { position: absolute; left: var(--space-3); top: 50%; transform: translateY(-50%); color: var(--color-text-muted); pointer-events: none; }
    .control input {
      width: 100%; min-height: 48px; padding-inline: 44px var(--space-12);
      font: inherit; font-size: var(--font-size-base); color: var(--color-text-primary);
      background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);
      transition: border-color var(--duration-fast) var(--easing-standard), box-shadow var(--duration-fast) var(--easing-standard);
    }
    .control input::placeholder { color: var(--color-neutral-400); }
    .control input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 22%, transparent); }
    .control .toggle {
      position: absolute; right: var(--space-2); top: 50%; transform: translateY(-50%);
      min-width: 40px; min-height: 40px; display: grid; place-items: center; cursor: pointer;
      color: var(--color-text-muted); background: transparent; border: none; border-radius: var(--radius-sm);
    }
    .control .toggle:active { color: var(--color-text-secondary); background: var(--color-surface-2); }

    .field.error input { border-color: var(--color-danger); box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-danger) 16%, transparent); }
    .field .msg { display: none; align-items: center; gap: var(--space-1); margin-top: var(--space-2); color: var(--color-danger); font-size: var(--font-size-xs); }
    .field.error .msg { display: flex; }

    .row-between { display: flex; align-items: center; justify-content: space-between; margin: var(--space-4) 0 var(--space-6); }
    .remember { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--font-size-sm); color: var(--color-text-secondary); cursor: pointer; }
    .remember input { width: 18px; height: 18px; accent-color: var(--color-primary); }
    .link { color: var(--color-primary); text-decoration: none; font-size: var(--font-size-sm); font-weight: var(--font-weight-medium); }
    .link:active { opacity: .7; }

    .btn-primary {
      width: 100%; min-height: 52px; display: inline-flex; align-items: center; justify-content: center; gap: var(--space-2);
      font: inherit; font-size: var(--font-size-base); font-weight: var(--font-weight-medium); cursor: pointer;
      color: var(--color-primary-fg); background: var(--color-primary); border: none; border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      transition: background var(--duration-fast) var(--easing-standard), transform var(--duration-fast) var(--easing-standard);
    }
    .btn-primary:active { background: var(--color-primary-hover); transform: scale(.99); }
    .btn-primary[disabled] { opacity: 0.7; }
    .spinner { width: 18px; height: 18px; border-radius: var(--radius-full); border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .form-foot { margin-top: var(--space-6); text-align: center; color: var(--color-text-secondary); font-size: var(--font-size-sm); }
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <span class="mark"><i data-lucide="compass" style="width:20px;height:20px"></i></span>
      <span class="name">Northwind</span>
    </header>

    <main class="scroll">
      <div class="head">
        <h1>登录</h1>
        <p>欢迎回来，继续你的工作。</p>
      </div>

      <div class="social">
        <button class="btn-social" type="button" aria-label="使用 Google 登录">
          <svg viewBox="0 0 48 48" aria-hidden="true"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 6.1 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 16.1 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.6-5.2l-6.3-5.2C29.2 35.1 26.7 36 24 36c-5.3 0-9.7-2.6-11.3-7l-6.5 5C9.6 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.6l6.3 5.2C39.9 35.6 44 30.3 44 24c0-1.3-.1-2.3-.4-3.5z"/></svg>
          Google
        </button>
        <button class="btn-social" type="button" aria-label="使用 GitHub 登录">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.5-3.9-1.5-.5-1.3-1.3-1.7-1.3-1.7-1.1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.8.4-1.3.7-1.6-2.6-.3-5.3-1.3-5.3-5.8 0-1.3.5-2.3 1.2-3.1-.1-.3-.5-1.5.1-3.1 0 0 1-.3 3.3 1.2a11.5 11.5 0 0 1 6 0C17.3 5 18.3 5.3 18.3 5.3c.6 1.6.2 2.8.1 3.1.8.8 1.2 1.8 1.2 3.1 0 4.5-2.7 5.5-5.3 5.8.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/></svg>
          GitHub
        </button>
      </div>

      <div class="divider">或使用邮箱登录</div>

      <form id="loginForm" novalidate>
        <div class="field" id="f-email">
          <label for="email">邮箱</label>
          <div class="control">
            <i data-lucide="mail" class="lead-icon" style="width:18px;height:18px"></i>
            <input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="you@company.com" />
          </div>
          <span class="msg"><i data-lucide="alert-circle" style="width:14px;height:14px"></i> 请输入有效的邮箱地址</span>
        </div>

        <div class="field" id="f-pass">
          <label for="password">密码</label>
          <div class="control">
            <i data-lucide="lock" class="lead-icon" style="width:18px;height:18px"></i>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
            <button type="button" class="toggle" id="togglePass" aria-label="显示密码">
              <i data-lucide="eye" style="width:18px;height:18px"></i>
            </button>
          </div>
          <span class="msg"><i data-lucide="alert-circle" style="width:14px;height:14px"></i> 密码不能为空</span>
        </div>

        <div class="row-between">
          <label class="remember"><input type="checkbox" name="remember" /> 记住我</label>
          <a class="link" href="#">忘记密码？</a>
        </div>

        <button class="btn-primary" type="submit" id="submitBtn">登录</button>
      </form>

      <p class="form-foot">还没有账户？<a class="link" href="#">免费注册</a></p>
    </main>
  </div>

  <script>
    lucide.createIcons();

    const toggle = document.getElementById("togglePass");
    const pass = document.getElementById("password");
    toggle.addEventListener("click", () => {
      const show = pass.type === "password";
      pass.type = show ? "text" : "password";
      toggle.setAttribute("aria-label", show ? "隐藏密码" : "显示密码");
      toggle.innerHTML = '<i data-lucide="' + (show ? "eye-off" : "eye") + '" style="width:18px;height:18px"></i>';
      lucide.createIcons();
    });

    const form = document.getElementById("loginForm");
    const submitBtn = document.getElementById("submitBtn");
    const emailField = document.getElementById("f-email");
    const passField = document.getElementById("f-pass");
    const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);

    emailField.querySelector("input").addEventListener("input", () => emailField.classList.remove("error"));
    passField.querySelector("input").addEventListener("input", () => passField.classList.remove("error"));

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      let ok = true;
      if (!isEmail(form.email.value.trim())) { emailField.classList.add("error"); ok = false; }
      if (!form.password.value) { passField.classList.add("error"); ok = false; }
      if (!ok) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> 登录中…';
      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = "登录";
        form.password.value = "";
      }, 1400);
    });
  </script>
</body>
</html>
